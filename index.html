    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      name="description"
      content="Juan Manuel Martínez — Fullstack Software Engineer from Montevideo, Uruguay. Building production systems that ship."
    />

    <meta property="og:title" content="Juan Manuel Martínez — Fullstack Software Engineer" />

      property="og:description"

    <meta name="theme-color" content="#050508" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('juanmadev-theme');
          if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
          else document.documentElement.dataset.theme = 'dark';
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@8..144,400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"

      rel="stylesheet"
      media="print"
      onload="this.media='all'"
